# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to use for 'slug' in file names
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command, regardless of autocommit
# revision_environment = false

# set to 'true' to allow alembic to attempt to detect base-level migrations
# sourceless = false

# version location specification; this defaults to alembic/versions.
# version_locations = %(here)s/alembic/versions

# the database connection URL is read dynamically from env in env.py
sqlalchemy.url = postgresql://localhost/db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
